<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Website{% endblock %}</title>
</head>
<body>

    <!-- Navbar (optional) -->
    <nav>
        <h2>My Flask App</h2>
    </nav>

    <!-- Main Content -->
    <div>
        {% block content %}
        <!-- Page content will go here -->
        {% endblock %}
    </div>

    <!-- Footer (optional) -->
    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
